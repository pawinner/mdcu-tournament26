<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MDCU Medical Tournament 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Prompt:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Background Decorative Grid and Glowing Orbs -->
  <div class="bg-decorations">
    <div class="grid-overlay"></div>
    <div class="glow-orb orb-cyan"></div>
    <div class="glow-orb orb-purple"></div>
  </div>

  <!-- SVG Heartbeat Line (ECG) Overlay -->
  <div class="heartbeat-container">
    <svg viewBox="0 0 1200 200" class="heartbeat-svg" preserveAspectRatio="none">
      <path class="heartbeat-path" d="M 0,100 L 300,100 L 320,80 L 340,120 L 360,100 L 400,100 L 410,30 L 430,170 L 450,100 L 500,100 L 510,85 L 520,115 L 530,100 L 800,100 L 810,40 L 830,165 L 845,100 L 900,100 L 920,80 L 940,120 L 960,100 L 1200,100" />
    </svg>
  </div>

  <!-- Main Views Container -->
  <main id="app-container">

    <!-- HOMEPAGE PORTAL -->
    <section id="view-home" class="view active">
      <div class="home-content">
        <div class="logo-wrapper">
          <img src="assets/images/congresslogo.jpg" alt="MDCU Congress Logo" class="congress-logo">
        </div>
        <h1 class="tournament-title">
          <span class="prefix">THE 4th</span>
          <span class="highlight">MDCU</span>
          <span class="suffix">MEDICAL TOURNAMENT 2026</span>
        </h1>
        <div class="pulse-line"></div>
        <p class="tournament-details">23 - 24 JULY 2026 • SELECT TOURNAMENT STAGE</p>

        <!-- Round Selection Cards -->
        <div class="portal-nav-container">
          
          <!-- Preliminary Round Card -->
          <a href="prelim.html" class="portal-card prelim-card">
            <div>
              <div class="portal-badge">23 JULY 2026</div>
              <h2 class="portal-title">PRELIMINARY ROUND</h2>
            </div>
            <div class="portal-action">
              <span>ENTER PRELIM ROUND</span>
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M5 12h14M12 5l7 7-7 7"/>
              </svg>
            </div>
          </a>

          <!-- Final Round Card -->
          <a href="final.html" class="portal-card final-card">
            <div>
              <div class="portal-badge">24 JULY 2026</div>
              <h2 class="portal-title">FINAL ROUND</h2>
            </div>
            <div class="portal-action">
              <span>ENTER FINAL ROUND</span>
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M5 12h14M12 5l7 7-7 7"/>
              </svg>
            </div>
          </a>

        </div>

      </div>
    </section>

  </main>

</body>
</html>
